---
# playbooks/smoke-test.yml — Minimal smoke test for OpenSAS fleet
#
# Takes inventory generated by parse-config.py and collects system info
# from every node: OS, kernel, memory, disk, and GPU details.
#
# Usage:
#   python3 scripts/parse-config.py config/opensas.dev.yaml --output-inventory
#   ansible-playbook -i inventory/opensas-dev/hosts.yml playbooks/smoke-test.yml

- name: OpenSAS smoke test — all nodes
  hosts: all
  gather_facts: true
  tasks:
    - name: OS and kernel
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "OS: {{ ansible_facts.distribution }} {{ ansible_facts.distribution_version }}"
          - "Kernel: {{ ansible_facts.kernel }}"
          - "Arch: {{ ansible_facts.architecture }}"

    - name: Memory
      ansible.builtin.debug:
        msg:
          - "Total memory: {{ (ansible_facts.memtotal_mb / 1024) | round(1) }} GB"
          - "Free memory: {{ (ansible_facts.memfree_mb / 1024) | round(1) }} GB"

    - name: Disk usage (root)
      ansible.builtin.shell: df -h / | tail -1 | awk '{print "Size:",$2," Used:",$3," Avail:",$4," Use%:",$5}'
      register: disk_info
      changed_when: false

    - name: Show disk
      ansible.builtin.debug:
        msg: "Disk (root): {{ disk_info.stdout }}"

- name: OpenSAS smoke test — GPU nodes
  hosts: gpu
  gather_facts: false
  tasks:
    - name: GPU info (nvidia-smi)
      ansible.builtin.shell: |
        nvidia-smi --query-gpu=name,memory.total,driver_version --format=csv,noheader
      register: gpu_info
      changed_when: false
      ignore_errors: true

    - name: Show GPU
      ansible.builtin.debug:
        msg: "GPU: {{ gpu_info.stdout }}"
      when: gpu_info is success

    - name: No GPU found
      ansible.builtin.debug:
        msg: "Warning: nvidia-smi not available on {{ inventory_hostname }}"
      when: gpu_info is failed
