{{- if .Values.langfuse.enabled }}
{{- $useEmptyDir := .Values.langfuse.postgresql.persistence.useEmptyDir | default false }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability
type: Opaque
stringData:
  SALT: {{ .Values.langfuse.salt | quote }}
  NEXTAUTH_SECRET: {{ .Values.langfuse.nextauthSecret | quote }}
  DATABASE_URL: "postgresql://{{ .Values.langfuse.postgresql.auth.username }}:{{ .Values.langfuse.postgresql.auth.password }}@{{ .Release.Name }}-langfuse-postgresql:5432/{{ .Values.langfuse.postgresql.auth.database }}"
---
{{- if not $useEmptyDir }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Release.Name }}-langfuse-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.langfuse.postgresql.persistence.size }}
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-langfuse-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgresql
  selector:
    {{- include "opensas-infra.langfuse-postgres.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-langfuse-postgresql
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "opensas-infra.langfuse-postgres.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opensas-infra.langfuse-postgres.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: postgresql
          image: "{{ .Values.langfuse.postgresql.image.repository }}:{{ .Values.langfuse.postgresql.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              value: {{ .Values.langfuse.postgresql.auth.username | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.langfuse.postgresql.auth.password | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.langfuse.postgresql.auth.database | quote }}
          ports:
            - containerPort: 5432
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
            requests:
              memory: "256Mi"
              cpu: "250m"
      volumes:
        - name: data
          {{- if $useEmptyDir }}
          emptyDir: {}
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-langfuse-postgresql
          {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability
spec:
  replicas: {{ .Values.langfuse.replicas }}
  selector:
    matchLabels:
      {{- include "opensas-infra.langfuse.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "opensas-infra.langfuse.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: langfuse
          image: "{{ .Values.langfuse.image.repository }}:{{ .Values.langfuse.image.tag }}"
          imagePullPolicy: {{ .Values.langfuse.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ .Release.Name }}-langfuse
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: NEXTAUTH_URL
              value: "http://localhost:3000"
          {{- with .Values.langfuse.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/public/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-langfuse
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "opensas-infra.labels" . | nindent 4 }}
    app.kubernetes.io/component: observability
spec:
  type: {{ .Values.langfuse.service.type }}
  ports:
    - port: {{ .Values.langfuse.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "opensas-infra.langfuse.selectorLabels" . | nindent 4 }}
{{- end }}
